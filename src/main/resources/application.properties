# ========================================
# Martinis Application Configuration
# Optimized for Railway.com Deployment
# Spring Boot 3.3.3
# ========================================

# ========================================
# Application Metadata
# ========================================
spring.application.name=martinis
spring.application.description=Professional Screenplay Management System

# ========================================
# Server Configuration
# ========================================
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024
server.http2.enabled=true

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ========================================
# JSP View Configuration
# ========================================
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# ========================================
# Database Configuration (Railway)
# ========================================
# DatabaseConfig.java resolves the connection from env vars in this order:
#   1. DATABASE_URL  - mysql://user:pass@host:port/db  OR  jdbc:mysql://...
#   2. MYSQL_URL     - Railway MySQL service primary variable (same format)
#   3. MYSQLHOST + MYSQLPORT + MYSQLDATABASE + MYSQLUSER + MYSQLPASSWORD - individual Railway vars
#   4. Localhost fallback (development only)
#
# When deploying on Railway, add a MySQL service and set:
#   DATABASE_URL = ${{MySQL.DATABASE_URL}}
# or rely on MYSQL_URL / individual MYSQL* variables exposed by the linked MySQL service.

# ========================================
# SQL Initialization
# ========================================
# Auto-run schema.sql on first startup
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.continue-on-error=false
spring.sql.init.encoding=UTF-8

# ========================================
# File Upload Configuration
# ========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB

# ========================================
# Jackson JSON Configuration
# ========================================
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ========================================
# Security Configuration
# ========================================
# BCrypt password encoding strength
spring.security.password.bcrypt.rounds=10

# ========================================
# Logging Configuration
# ========================================
logging.level.root=INFO
logging.level.com.chriswatnee.martinis=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.zaxxer.hikari=INFO

# Logging pattern for Railway
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ========================================
# Actuator / Management Endpoints
# ========================================
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.health.defaults.enabled=true

# ========================================
# Performance & Production Settings
# ========================================
# Template caching
spring.web.resources.cache.cachecontrol.max-age=3600
spring.web.resources.chain.cache=true

# Disable unnecessary features in production
spring.jmx.enabled=false
spring.devtools.restart.enabled=false

# ========================================
# Railway-Specific Environment Variables
# ========================================
# PORT              - Automatically provided by Railway
# DATABASE_URL      - Set to ${{MySQL.DATABASE_URL}} to use linked MySQL service
# MYSQL_URL         - Provided automatically by Railway's linked MySQL service
# MYSQLHOST         - MySQL host (provided by Railway MySQL service)
# MYSQLPORT         - MySQL port (provided by Railway MySQL service)
# MYSQLDATABASE     - MySQL database name (provided by Railway MySQL service)
# MYSQLUSER         - MySQL user (provided by Railway MySQL service)
# MYSQLPASSWORD     - MySQL password (provided by Railway MySQL service)
# ADMIN_USERNAME    - Initial admin username
# ADMIN_PASSWORD    - Initial admin password
# ADMIN_FIRSTNAME   - Admin first name
# ADMIN_LASTNAME    - Admin last name
